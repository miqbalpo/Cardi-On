<!DOCTYPE html>
<html lang="en" class="bg">
  <head>
    <title>Sign Up</title>
	  <link rel="stylesheet" href="instructor.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Josefin+Sans&display=swap" rel="stylesheet">
    <link rel="icon" href="img/cardion.png" type="image/png">
    <meta charset="utf-8">
  </head>

  <body>
    <h1>Sign Up</h1>

    <div class="flex card">
      <div class="flex-left">
        <form action=''>
          <fieldset>
            <label>Enter Your Full Name<input type="text" name="first-name" placeholder="John Doe" required /></label>
            <label>Enter Your Email<input type="email" name="email" placeholder="username@domain.com" required /></label>
            <label>Create a New Password<input type="password" name="password" required /></label>
          </fieldset>
          <fieldset>
            <div class="flex">
                <label>Upload a Profile Picture<input type="file" name="profile" accept="image/*" class="img-form"></label>
                <label>Upload Certificate<input type="file" name="certificate" accept="application/pdf" class="img-form"></label>
            </div>
            <div class="flex">
                <label>Age<input type="number" name="age" min="12" max="120" class="age-form"/></label>
                <label>Years of Experience<input type="number" name="age" min="12" max="120" class="experience"/></label>
            </div>
            <label>Provide a Bio
              <textarea name="bio" rows="3" cols="30" placeholder="Enter your bio here..."></textarea>
            </label>
          </fieldset>
    
          <div class="flex">
            <a href="account.html" id="back">← Back</a>
          </div>
        </form>
      </div>
      <div class="flex-right">
        <a href="homepage.html">Create Account</a>
      </div>
  </div>
  </body>
</html>
