<!DOCTYPE html>
<html lang="en" class="bg">
  <head>
    <title>Sign Up</title>
	  <link rel="stylesheet" href="trainee.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Josefin+Sans&display=swap" rel="stylesheet">
    <link rel="icon" href="img/cardion.png" type="image/png">
    <meta charset="utf-8">
  </head>

  <body>
    <h1>Sign Up</h1>

    <div class="flex">
      <div class="flex-left">
        <form action=''>
          <fieldset>
            <label>Enter Your Full Name<input type="text" name="first-name" placeholder="John" required /></label>
            <label>Enter Your Email<input type="email" name="email" placeholder="username@domain.com" required /></label>
            <label>Create a New Password<input type="password" name="password" required /></label>
          </fieldset>
    
          <fieldset>
            <label>Upload a Profile Picture<input type="file" name="img" accept="image/*"></label>
            <label>Input Your Age (years): <input type="number" name="age" max="120" />
            </label>
            <label>Provide a Bio
              <textarea name="bio" rows="3" cols="30" placeholder="Enter your bio here..."></textarea>
            </label>
          </fieldset>
    
          <div class="flex">
            <a href="login.html">Back to Login Page</a>
            <input type="submit" value="Create Account" formaction="login.html"/>
          </div>
        </form>
      </div>
      <div class="flex-right">
        <h1 class="title">Cardi-On!</h1>

      </div>
  </div>
  </body>
</html>
