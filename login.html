<!DOCTYPE html>
<html lang="en" class="bg">
  <head>
    <title>Login</title>
	  <link rel="stylesheet" href="login.css" />
    <meta name="viewport" content="width=device-width">
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Josefin+Sans&display=swap" rel="stylesheet">
    <link rel="icon" href="img/cardion-red.png" type="image/png">
    <meta charset="utf-8">
  </head>

  <body>
    <h1>Login</h1>
    <form action=''>
      <fieldset>
        <label>Email<input type="email" name="email" placeholder="username@domain.com" required /></label>
        <label>Password<input type="password" name="password" required /></label>
        <a href="#" class="forgot">Forgot Password?</a>
      </fieldset>
      <input type="submit" value="Continue" id="login-button" formaction="homepage.html"/>

      <p><b>Sign In Using</b></p>
      <hr>
      <div class="flex">
        <a class="flex-button">
          <img src="img\google.png" id="google" alt="google logo">
        </a>
        <a class="flex-button">
          <img src="img\fb.png" id="fb" alt="facebook logo">
        </a>
        <a class="flex-button">
          <img src="img\apple.png" id="apple" alt="apple logo">
        </a>
      </div> 
      <br>
      <p class="create">Don't have an account yet?
        <a href="account.html">
            <b>Sign Up</b>
        </a>
    </p>
    </form>

    <footer>
      <a href="index.html">← Back</a>
    </footer>
  </body>
</html>
